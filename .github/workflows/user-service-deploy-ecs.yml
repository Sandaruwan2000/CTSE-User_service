name: Deploy user-service to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      IMAGE_TAG: latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          REGISTRY_CLEAN="$(echo "$REGISTRY" | tr -d '\r\n' | xargs)"
          ECR_REPOSITORY_CLEAN="$(echo "$ECR_REPOSITORY" | tr -d '\r\n' | xargs)"
          IMAGE_TAG_CLEAN="$(echo "$IMAGE_TAG" | tr -d '\r\n' | xargs)"

          if [ -z "$REGISTRY_CLEAN" ] || [ -z "$ECR_REPOSITORY_CLEAN" ] || [ -z "$IMAGE_TAG_CLEAN" ]; then
            echo "Required image variables are empty. Check repo variables and ECR login output."
            exit 1
          fi

          IMAGE_URI="${REGISTRY_CLEAN}/${ECR_REPOSITORY_CLEAN}:${IMAGE_TAG_CLEAN}"

          echo "Building Docker image: $IMAGE_URI"
          docker build -t "$IMAGE_URI" ./user-service
          docker push "$IMAGE_URI"

      - name: Deploy to ECS
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          REGISTRY_CLEAN="$(echo "$REGISTRY" | tr -d '\r\n' | xargs)"
          ECR_REPOSITORY_CLEAN="$(echo "$ECR_REPOSITORY" | tr -d '\r\n' | xargs)"
          IMAGE_TAG_CLEAN="$(echo "$IMAGE_TAG" | tr -d '\r\n' | xargs)"
          ECS_CLUSTER_CLEAN="$(echo "$ECS_CLUSTER" | tr -d '\r\n' | xargs)"
          ECS_SERVICE_CLEAN="$(echo "$ECS_SERVICE" | tr -d '\r\n' | xargs)"
          ECS_TASK_FAMILY_CLEAN="$(echo "$ECS_TASK_FAMILY" | tr -d '\r\n' | xargs)"

          if [ -z "$ECS_CLUSTER_CLEAN" ] || [ -z "$ECS_SERVICE_CLEAN" ] || [ -z "$ECS_TASK_FAMILY_CLEAN" ]; then
            echo "Required ECS variables are empty. Check repository variables."
            exit 1
          fi

          IMAGE_URI="${REGISTRY_CLEAN}/${ECR_REPOSITORY_CLEAN}:${IMAGE_TAG_CLEAN}"

          # Get current task definition
          aws ecs describe-task-definition --task-definition "$ECS_TASK_FAMILY_CLEAN" > taskdef.json

          # Update container image & handle null roles
          jq --arg IMAGE_URI "$IMAGE_URI" \
            '.taskDefinition.containerDefinitions[0].image=$IMAGE_URI
             | {family: .taskDefinition.family,
                containerDefinitions: .taskDefinition.containerDefinitions,
                volumes: .taskDefinition.volumes,
                taskRoleArn: (.taskDefinition.taskRoleArn // ""),
                executionRoleArn: (.taskDefinition.executionRoleArn // ""),
                networkMode: .taskDefinition.networkMode,
                requiresCompatibilities: .taskDefinition.requiresCompatibilities,
                cpu: .taskDefinition.cpu,
                memory: .taskDefinition.memory}' \
            taskdef.json > new-taskdef.json

          # Register new task definition revision
          NEW_REV=$(aws ecs register-task-definition --cli-input-json file://new-taskdef.json | jq -r '.taskDefinition.revision')
          echo "New task definition revision: $NEW_REV"

          # Update ECS service to use new revision & force deployment
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_CLEAN" \
            --service "$ECS_SERVICE_CLEAN" \
            --task-definition "$ECS_TASK_FAMILY_CLEAN:$NEW_REV" \
            --force-new-deployment

          echo "ECS service updated with latest image!"